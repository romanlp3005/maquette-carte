<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Présentation VIP - DIGITAGPRO x Le Petit Plus</title>
    <style>
        /* --- STYLES GLOBAUX --- */
        body { margin: 0; overflow: hidden; background-color: #a3a3a3; font-family: 'Segoe UI', sans-serif; }
        
        /* BOUTON MENU */
        #btn-toggle-panel {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(20, 20, 20, 0.9); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 18px; border-radius: 8px; cursor: pointer; font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); backdrop-filter: blur(5px);
        }

        /* ENCART LOGOS (MILIEU HAUT) */
        .collab-logos {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; justify-content: center; gap: 20px;
            background: rgba(255, 255, 255, 0.95); padding: 10px 25px; border-radius: 15px;
            border: 1px solid white; box-shadow: 0 8px 25px rgba(0,0,0,0.1); z-index: 5;
            width: auto; max-width: 60vw; pointer-events: none;
        }
        .collab-logos img { max-width: 130px; max-height: 50px; object-fit: contain; }
        .collab-cross { color: #ccc; font-size: 1.2rem; font-weight: bold; }

        /* PANNEAU ÉDITEUR (GAUCHE) */
        #builder-panel {
            position: absolute; top: 0; left: 0; height: 100vh; width: 340px;
            background: rgba(20, 20, 20, 0.98); backdrop-filter: blur(15px);
            padding: 20px; box-sizing: border-box; color: white;
            box-shadow: 5px 0 30px rgba(0,0,0,0.5); z-index: 100;
            display: flex; flex-direction: column;
            
            /* CORRECTION SCROLL MOBILE */
            overflow-y: scroll; 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none;
            padding-bottom: 100px; /* Espace pour ne pas bloquer le bouton en bas */
            
            transform: translateX(0); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #builder-panel::-webkit-scrollbar { display: none; }
        #builder-panel.collapsed { transform: translateX(-100%); }

        @media (max-width: 600px) {
            #builder-panel { width: 100%; }
            .collab-logos { top: auto; bottom: 20px; padding: 8px 15px; max-width: 80vw; }
        }

        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px; }
        .btn-close { background: #333; border: none; color: white; padding: 8px 15px; border-radius: 5px; font-size: 1rem; cursor: pointer; }

        .finition-box { background: rgba(76, 175, 80, 0.15); border: 1px solid rgba(76, 175, 80, 0.4); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .col { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        h3 { margin: 0 0 10px 0; font-size: 1rem; color: #4CAF50; }
        
        select { width: 100%; padding: 12px; background: #222; color: white; border: 1px solid #444; border-radius: 6px; margin-bottom: 10px; font-size: 16px; /* Évite le zoom auto sur iOS */}
        .custom-file-upload { display: block; padding: 10px; background: #333; color: #aaa; text-align: center; border: 1px dashed #555; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }

        .preview-box { width: 100%; height: 130px; margin-top: 10px; background: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .preview-img { width: 100%; height: 100%; object-fit: contain; display: none; }

        #btn-create { background: #4CAF50; color: white; border: none; padding: 20px; width: 100%; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #btn-create:disabled { background: #444; color: #777; cursor: not-allowed; box-shadow: none; }

        #top-ui-right { position: absolute; top: 15px; right: 15px; z-index: 5; }
        .btn-clear { background: #d32f2f; color: white; border: none; padding: 12px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div class="collab-logos">
        <img src="Logo DIGITAGPRO.png" alt="DIGITAGPRO">
        <span class="collab-cross">✖</span>
        <img src="logo le petit plus.png" alt="Le Petit Plus">
    </div>

    <button id="btn-toggle-panel" onclick="togglePanel()"> Menu</button>

    <div id="top-ui-right">
        <button class="btn-clear" onclick="clearCards()">🗑️ Reset</button>
    </div>

    <div id="builder-panel">
        <div class="panel-header">
            <h2>✨ Configuration</h2>
            <button class="btn-close" onclick="togglePanel()">Fermer ✖</button>
        </div>

        <div class="finition-box">
            <h3>✨ Finition</h3>
            <select id="select-finish">
                <option value="brillant">Brillant (Glossy)</option>
                <option value="mat">Mat (Matte)</option>
            </select>
        </div>
        
        <div class="col">
            <h3>🖼️ Recto</h3>
            <select id="select-front">
                <option value="">-- Sélectionner --</option>
                <option value="recto blanc fruit.png">Recto Blanc Fruit</option>
                <option value="recto blanc.png">Recto Blanc</option>
                <option value="recto noir fruit.png">Recto Noir Fruit</option>
                <option value="recto noir.png">Recto Noir</option>
            </select>
            <label class="custom-file-upload">
                <input type="file" accept="image/*" id="upload-front">
                + Importer une image
            </label>
            <div class="preview-box">
                <img id="preview-front" class="preview-img">
                <span id="ph-front" style="color:#444; font-size: 0.7rem;">Vide</span>
            </div>
        </div>

        <div class="col">
            <h3>🔄 Verso</h3>
            <select id="select-back">
                <option value="">-- Sélectionner --</option>
                <option value="verso blanc carte adherent.png">Verso Blanc Adhérent</option>
                <option value="verso blanc fruit adherents.png">Verso Blanc Fruit</option>
                <option value="verso noir carte benevole.png">Verso Noir Bénévole</option>
                <option value="verso noir fruit benevole.png">Verso Noir Fruit</option>
            </select>
            <label class="custom-file-upload">
                <input type="file" accept="image/*" id="upload-back">
                + Importer une image
            </label>
            <div class="preview-box">
                <img id="preview-back" class="preview-img">
                <span id="ph-back" style="color:#444; font-size: 0.7rem;">Vide</span>
            </div>
        </div>

        <!-- Bouton de validation bien dégagé -->
        <button id="btn-create" disabled>Générer la carte 3D</button>
        
        <div style="height: 40px; width: 100%;"></div> <!-- Espace de sécurité final -->
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const builderPanel = document.getElementById('builder-panel');
        window.togglePanel = function() {
            builderPanel.classList.toggle('collapsed');
        };

        let currentFrontUrl = null, currentBackUrl = null, currentFinish = 'brillant';
        const selectFront = document.getElementById('select-front'), selectBack = document.getElementById('select-back'), selectFinish = document.getElementById('select-finish');
        const uploadFront = document.getElementById('upload-front'), uploadBack = document.getElementById('upload-back');
        const previewFront = document.getElementById('preview-front'), previewBack = document.getElementById('preview-back');
        const phFront = document.getElementById('ph-front'), phBack = document.getElementById('ph-back'), btnCreate = document.getElementById('btn-create');

        function updatePreview(type, url) {
            if (type === 'front') { currentFrontUrl = url; previewFront.src = url || ""; previewFront.style.display = url ? 'block' : 'none'; phFront.style.display = url ? 'none' : 'block'; } 
            else { currentBackUrl = url; previewBack.src = url || ""; previewBack.style.display = url ? 'block' : 'none'; phBack.style.display = url ? 'none' : 'block'; }
            btnCreate.disabled = !(currentFrontUrl && currentBackUrl);
        }

        selectFront.addEventListener('change', (e) => updatePreview('front', e.target.value));
        selectBack.addEventListener('change', (e) => updatePreview('back', e.target.value));
        uploadFront.addEventListener('change', (e) => { if(e.target.files[0]) { selectFront.value = ""; updatePreview('front', URL.createObjectURL(e.target.files[0])); } });
        uploadBack.addEventListener('change', (e) => { if(e.target.files[0]) { selectBack.value = ""; updatePreview('back', URL.createObjectURL(e.target.files[0])); } });

        selectFinish.addEventListener('change', (e) => {
            currentFinish = e.target.value;
            activeCards.forEach(card => card.material.forEach(mat => applyFinishToMaterial(mat, currentFinish)));
        });

        btnCreate.addEventListener('click', () => {
            if(currentFrontUrl && currentBackUrl) { 
                addCustomCardToScene(currentFrontUrl, currentBackUrl); 
                if(window.innerWidth < 600) togglePanel(); 
            }
        });

        const activeCards = [], cardSpacing = 10; 
        const scene = new THREE.Scene(); scene.background = new THREE.Color('#a3a3a3');
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000); camera.position.set(0, 0, 20);
        const renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); renderer.shadowMap.enabled = true; renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.5;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true; controls.maxPolarAngle = Math.PI / 2 + 0.1;

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const frontLight = new THREE.DirectionalLight(0xffffff, 3.5); frontLight.position.set(5, 10, 8); frontLight.castShadow = true; scene.add(frontLight);
        const backLightDir = new THREE.DirectionalLight(0xffffff, 3.5); backLightDir.position.set(-5, 10, -8); backLightDir.castShadow = true; scene.add(backLightDir);
        const fill1 = new THREE.PointLight(0xffffff, 2.5, 50); fill1.position.set(0, 0, 6); scene.add(fill1);

        const planeMat = new THREE.MeshStandardMaterial({ color: '#a3a3a3', roughness: 0.6 });
        const plane = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), planeMat); plane.rotation.x = -Math.PI / 2; plane.position.y = -4.5; plane.receiveShadow = true; scene.add(plane);

        const width = 8.56, height = 5.4, radius = 0.48, depth = 0.08; 
        const shape = new THREE.Shape(); const x = -width/2, y = -height/2;
        shape.moveTo(x+radius, y); shape.lineTo(x+width-radius, y); shape.quadraticCurveTo(x+width, y, x+width, y+radius); shape.lineTo(x+width, y+height-radius); shape.quadraticCurveTo(x+width, y+height, x+width-radius, y+height); shape.lineTo(x+radius, y+height); shape.quadraticCurveTo(x, y+height, x, y+height-radius); shape.lineTo(x, y+radius); shape.quadraticCurveTo(x, y, x+radius, y);
        let sharedGeometry = new THREE.ExtrudeGeometry(shape, { depth: depth, bevelEnabled: true, bevelSegments: 3, steps: 1, bevelSize: 0.02, bevelThickness: 0.02 });
        sharedGeometry.center(); sharedGeometry.computeVertexNormals(); sharedGeometry = sharedGeometry.toNonIndexed();
        const pos = sharedGeometry.attributes.position, norm = sharedGeometry.attributes.normal, uv = sharedGeometry.attributes.uv;
        for (let i = 0; i < pos.count; i++) {
            let u = (pos.getX(i) / width) + 0.5, v = (pos.getY(i) / height) + 0.5;
            if (pos.getZ(i) < 0) u = 1 - u; uv.setXY(i, u, v);
        }
        sharedGeometry.clearGroups();
        for (let i = 0; i < pos.count; i += 3) {
            const nz = (norm.getZ(i) + norm.getZ(i+1) + norm.getZ(i+2)) / 3;
            let matIndex = 2; if (nz > 0.5) matIndex = 0; else if (nz < -0.5) matIndex = 1; sharedGeometry.addGroup(i, 3, matIndex);
        }

        const textureLoader = new THREE.TextureLoader();
        function applyFinishToMaterial(mat, finishType) {
            mat.roughness = finishType === 'mat' ? 0.8 : 0.15; mat.clearcoat = finishType === 'mat' ? 0 : 1; mat.clearcoatRoughness = 0.05; mat.needsUpdate = true;
        }

        function addCustomCardToScene(frontUrl, backUrl) {
            const materials = [new THREE.MeshPhysicalMaterial({ color: 0xffffff }), new THREE.MeshPhysicalMaterial({ color: 0xffffff }), new THREE.MeshPhysicalMaterial({ color: 0xeeeeee })];
            materials.forEach(mat => applyFinishToMaterial(mat, currentFinish));
            const newCard = new THREE.Mesh(sharedGeometry, materials); newCard.castShadow = true;
            const loadText = (url, mat) => textureLoader.load(url, (t) => { t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = 8; mat.map = t; mat.needsUpdate = true; });
            loadText(frontUrl, materials[0]); loadText(backUrl, materials[1]);
            scene.add(newCard); activeCards.push(newCard); arrangeCards();
        }

        function arrangeCards() {
            const total = activeCards.length; if (total === 0) return;
            const startX = -((total - 1) * cardSpacing) / 2;
            activeCards.forEach((c, i) => c.position.x = startX + (i * cardSpacing));
            const zoom = window.innerWidth < 600 ? total * 15 : Math.max(20, total * 8);
            camera.position.z = zoom; controls.update();
        }

        window.clearCards = function() {
            activeCards.forEach(c => { scene.remove(c); c.material.forEach(m => { if(m.map) m.map.dispose(); m.dispose(); }); });
            activeCards.length = 0; camera.position.z = 20; controls.update();
        }

        function animate() {
            requestAnimationFrame(animate); controls.update();
            const time = performance.now() / 1000;
            activeCards.forEach((c, i) => { c.position.y = Math.sin(time * 1.5 + i) * 0.2; c.rotation.y = Math.sin(time * 0.5 + i) * 0.05; });
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); arrangeCards();
        });
    </script>
</body>
</html>
